    <path d="M180 52 250 93l-70 41-70-41 70-41Z" fill="#FFFFFF" opacity="0.04"/>
    <path d="M180 35 274 89v141l-94 97-94-97V89l94-54Z" fill="none" stroke="url(#rim)" stroke-linejoin="round" stroke-width="2"/>
