      <stop offset="0.7" stop-color="#0A0A0A" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#222222" stop-opacity="0.78"/>
    </linearGradient>
    <linearGradient id="zbody" x1="114" y1="104" x2="246" y2="215" gradientUnits="userSpaceOnUse">
