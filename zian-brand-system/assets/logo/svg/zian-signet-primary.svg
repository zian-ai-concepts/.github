<svg width="360" height="360" viewBox="0 0 360 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ZIAN monolith signet</title>
  <desc id="desc">Dark faceted monolith mark with metallic Z, aura, reflection, rim highlights and engraved lines.</desc>
  <defs>
    <radialGradient id="aura" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(180 176) rotate(90) scale(154 126)">
      <stop offset="0" stop-color="#DDE4DA" stop-opacity="0.22"/>
      <stop offset="0.58" stop-color="#DDE4DA" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#DDE4DA" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shell" x1="95" y1="42" x2="271" y2="305" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3A3A3A"/>
      <stop offset="0.18" stop-color="#161616"/>
      <stop offset="0.55" stop-color="#050505"/>
      <stop offset="1" stop-color="#1B1B1B"/>
    </linearGradient>
    <linearGradient id="left" x1="94" y1="74" x2="183" y2="308" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2A2A2A" stop-opacity="0.70"/>
      <stop offset="1" stop-color="#050505" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="right" x1="275" y1="74" x2="181" y2="309" gradientUnits="userSpaceOnUse">
