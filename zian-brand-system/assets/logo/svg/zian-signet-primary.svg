      <stop offset="0.52" stop-color="#555555"/>
      <stop offset="0.78" stop-color="#CCCCCC"/>
      <stop offset="1" stop-color="#F6F6EE"/>
    </linearGradient>
    <linearGradient id="zhigh" x1="100" y1="91" x2="240" y2="236" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.74"/>
      <stop offset="0.38" stop-color="#DCDCDC" stop-opacity="0.32"/>
