<svg
  class="zian-monolith-signet zian-monolith-signet--hero"
  viewBox="0 0 360 360"
  focusable="false"
  role="img"
  aria-labelledby="zian-monolith-title zian-monolith-description"
  xmlns="http://www.w3.org/2000/svg"
  style="--zian-rim-gradient: url(#zian-monolith-rim-gradient);"
>
  <title id="zian-monolith-title">ZIAN monolith signet</title>
  <desc id="zian-monolith-description">
    A dark faceted monolith mark with a metallic Z, subtle aura, reflection,
    rim highlights, and engraved detail lines.
  </desc>
  <style>
    .zian-monolith-signet {
      display: block;
      filter:
        drop-shadow(0 28px 40px rgba(0, 0, 0, 0.86))
        drop-shadow(0 0 20px rgba(221, 228, 218, 0.14));
      height: auto;
      overflow: visible;
      width: min(100%, clamp(14rem, 29vw, 24rem));
    }

    .zian-monolith-signet.zian-monolith-signet--hero {
      filter:
        drop-shadow(0 38px 48px rgba(0, 0, 0, 0.92))
        drop-shadow(0 0 28px rgba(221, 228, 218, 0.18));
    }

    .zian-monolith-aura {
      filter: blur(5px);
      opacity: 0.82;
    }

    .zian-monolith-reflection {
      filter: blur(6px);
      opacity: 0.64;
    }

    .zian-monolith-shell {
      stroke: rgba(246, 246, 238, 0.2);
      stroke-width: 1.25;
    }

    .zian-monolith-side {
      mix-blend-mode: screen;
      opacity: 0.86;
    }

    .zian-monolith-core {
      fill: rgba(225, 225, 216, 0.075);
      stroke: rgba(245, 245, 235, 0.18);
      stroke-linejoin: round;
      stroke-width: 0.85;
    }

    .zian-monolith-crown {
      mix-blend-mode: screen;
      opacity: 0.58;
    }

    .zian-monolith-frame {
      filter: drop-shadow(0 0 8px rgba(232, 238, 226, 0.22));
      stroke: var(--zian-rim-gradient, url(#zian-monolith-rim-gradient));
      stroke-linejoin: round;
      stroke-width: 2;
    }

    .zian-monolith-inner-frame {
      opacity: 0.78;
      stroke: rgba(236, 240, 232, 0.36);
      stroke-dasharray: 2 7;
      stroke-linejoin: round;
      stroke-width: 0.9;
    }

    .zian-monolith-z path {
      stroke: rgba(255, 255, 255, 0.34);
      stroke-linejoin: round;
      stroke-width: 1.05;
    }

    .zian-monolith-engraving {
      fill: none;
      opacity: 0.74;
      stroke: rgba(244, 247, 240, 0.42);
      stroke-linecap: round;
      stroke-width: 0.85;
    }

    .zian-monolith-spark-lines {
      fill: none;
      opacity: 0.34;
      stroke: rgba(246, 246, 236, 0.7);
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 0.8;
    }

    .zian-monolith-rim {
      animation: zian-monolith-rim-pulse 7s ease-in-out infinite;
      filter: drop-shadow(0 0 16px rgba(232, 238, 226, 0.3));
      stroke: var(--zian-rim-gradient, url(#zian-monolith-rim-gradient));
      stroke-linejoin: round;
      stroke-width: 1.85;
    }

    @keyframes zian-monolith-rim-pulse {
      0%,
      100% {
        opacity: 0.66;
      }

      50% {
        opacity: 0.94;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .zian-monolith-rim {
        animation: none !important;
      }
    }
  </style>
  <defs>
    <radialGradient id="zian-monolith-aura-gradient" cx="50%" cy="38%" r="62%">
      <stop offset="0" stop-color="#cccccc" stop-opacity="0.15" />
      <stop offset="0.4" stop-color="#555555" stop-opacity="0.08" />
      <stop offset="1" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
    <linearGradient
      id="zian-monolith-shell-gradient"
      x1="100"
      y1="58"
      x2="250"
      y2="306"
      gradientUnits="userSpaceOnUse"
    >
      <stop offset="0" stop-color="#222222" />
      <stop offset="0.42" stop-color="#0a0a0a" />
      <stop offset="1" stop-color="#000000" />
    </linearGradient>
    <linearGradient
      id="zian-monolith-shell-left-gradient"
      x1="91"
      y1="70"
      x2="177"
      y2="310"
      gradientUnits="userSpaceOnUse"
    >
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.1" />
      <stop offset="0.36" stop-color="#888888" stop-opacity="0.05" />
      <stop offset="1" stop-color="#000000" stop-opacity="0.08" />
    </linearGradient>
    <linearGradient
      id="zian-monolith-shell-right-gradient"
      x1="259"
      y1="82"
      x2="166"
      y2="295"
      gradientUnits="userSpaceOnUse"
    >
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.12" />
      <stop offset="0.48" stop-color="#555555" stop-opacity="0.04" />
      <stop offset="1" stop-color="#000000" stop-opacity="0.1" />
    </linearGradient>
    <linearGradient
      id="zian-monolith-z-body-gradient"
      x1="95"
      y1="93"
      x2="249"
      y2="264"
      gradientUnits="userSpaceOnUse"
    >
      <stop offset="0" stop-color="#e2e2e2" stop-opacity="0.72" />
      <stop offset="0.22" stop-color="#909090" stop-opacity="0.52" />
      <stop offset="0.58" stop-color="#2f2f2f" stop-opacity="0.76" />
      <stop offset="1" stop-color="#050505" stop-opacity="0.92" />
    </linearGradient>
    <linearGradient
      id="zian-monolith-z-highlight-gradient"
      x1="100"
      y1="91"
      x2="240"
      y2="236"
      gradientUnits="userSpaceOnUse"
    >
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.74" />
      <stop offset="0.38" stop-color="#dcdcdc" stop-opacity="0.32" />
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.08" />
    </linearGradient>
    <linearGradient
      id="zian-monolith-rim-gradient"
      x1="108"
      y1="54"
      x2="258"
      y2="290"
      gradientUnits="userSpaceOnUse"
    >
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.6" />
      <stop offset="0.42" stop-color="#888888" stop-opacity="0.2" />
      <stop offset="0.72" stop-color="#ffffff" stop-opacity="0.4" />
      <stop offset="1" stop-color="#555555" stop-opacity="0.2" />
    </linearGradient>
    <filter id="zian-monolith-inner-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow
        dx="0"
        dy="12"
        stdDeviation="10"
        flood-color="#000000"
        flood-opacity="0.65"
      />
    </filter>
  </defs>
  <ellipse
    class="zian-monolith-aura"
    cx="180"
    cy="176"
    rx="126"
    ry="154"
    fill="url(#zian-monolith-aura-gradient)"
  />
  <ellipse
    class="zian-monolith-reflection"
    cx="180"
    cy="318"
    rx="80"
    ry="11"
    fill="rgba(200, 200, 200, 0.10)"
  />
  <path
    class="zian-monolith-shell"
    d="M180 35 274 89v141l-94 97-94-97V89l94-54Z"
    fill="url(#zian-monolith-shell-gradient)"
  />
  <path
    class="zian-monolith-side zian-monolith-side--left"
    d="M180 35 86 89v141l94 97v-43l-65-68V106l65-38V35Z"
    fill="url(#zian-monolith-shell-left-gradient)"
  />
  <path
    class="zian-monolith-side zian-monolith-side--right"
    d="M180 35 274 89v141l-94 97v-43l65-68V106l-65-38V35Z"
    fill="url(#zian-monolith-shell-right-gradient)"
  />
  <path
    class="zian-monolith-core"
    d="M180 72 238 107v104l-58 61-58-61V107l58-35Z"
  />
  <path
    class="zian-monolith-crown"
    d="M180 52 250 93l-70 41-70-41 70-41Z"
    fill="rgba(255, 255, 255, 0.04)"
  />
  <path
    class="zian-monolith-frame"
    d="M180 35 274 89v141l-94 97-94-97V89l94-54Z"
    fill="none"
  />
  <path
    class="zian-monolith-inner-frame"
    d="M180 65 246 104v111l-66 70-66-70V104l66-39Z"
    fill="none"
  />
  <g class="zian-monolith-z" filter="url(#zian-monolith-inner-shadow)">
    <path
      d="M114 104h132v32l-72 47h72v32H114v-32l72-47h-72v-32z"
      fill="url(#zian-monolith-z-body-gradient)"
    />
    <path d="M114 104h132v32H114z" fill="url(#zian-monolith-z-highlight-gradient)" />
    <path
      d="M186 136h60l-72 47h-60z"
      fill="url(#zian-monolith-z-highlight-gradient)"
      opacity="0.56"
    />
    <path
      d="M114 183h132v32H114z"
      fill="url(#zian-monolith-z-highlight-gradient)"
      opacity="0.26"
    />
  </g>
  <g class="zian-monolith-engraving" fill="none" stroke="rgba(255,255,255,0.1)">
    <path d="M130 120h100" />
    <path d="M206 142l-52 35" />
    <path d="M130 199h100" />
    <path d="M180 65v39" />
    <path d="M180 215v70" />
  </g>
  <g class="zian-monolith-spark-lines" fill="none" stroke="rgba(255,255,255,0.15)">
    <path d="M110 89 180 48 250 89" />
    <path d="M100 229 180 310 260 229" />
  </g>
  <path
    class="zian-monolith-rim"
    d="M180 35 274 89v141l-94 97-94-97V89l94-54Z"
    fill="none"
  />
</svg>
